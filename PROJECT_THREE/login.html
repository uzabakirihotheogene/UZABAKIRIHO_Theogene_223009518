<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Theogene Relax</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <h2 style="text-align:center; margin-bottom:20px; color:#1a3a2a;">Admin Login</h2>

    <!-- ERROR MESSAGE -->
    <div id="error-msg" style="display:none; background:#fee2e2; color:#dc2626; padding:12px; border-radius:8px; text-align:center; margin-bottom:15px;">
        ❌ Wrong username or password. Please try again.
    </div>

    <form action="login.php" method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p style="text-align:center; margin-top:15px;">
        Forgot password? <a href="register.html">Register a new account</a>
    </p>
</div>

<script>
    const params = new URLSearchParams(window.location.search);

if (params.get("error") === "1") {
    document.getElementById("error-msg").style.display = "block";
}

if (params.get("registered") === "1") {
    const msg = document.createElement("div");
    msg.innerText = "✅ Account created! Please login.";
    msg.style.cssText = "background:#dcfce7;color:#16a34a;padding:12px;border-radius:8px;text-align:center;margin-bottom:15px;";
    document.querySelector(".container").insertBefore(msg, document.querySelector("form"));
}
</script>
</body>
</html>
