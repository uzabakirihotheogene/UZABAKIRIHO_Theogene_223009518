<head>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<nav>
    <div class="logo">
        <img src="logo.png" alt="Hotel Logo">
    </div>
    <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>

    <a href="gallery.html">Gallery</a>

    <a href="contact.html">Contact Us</a>
    <a href="login.html" style="background: #c9a84c; color: #1a3a2a;"> Login</a>
</div>

<div class="container">
    <h2 style="text-align:center; margin-bottom:20px; color:#1a3a2a;">Order Food</h2>

    <!-- FIX: action now correctly points to php/order.php -->
    <form action="order.php" method="POST">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="text" name="phone" placeholder="Phone" required>
        <select name="menu">
            <option value="Fish">Fish</option>
            <option value="Drink">Drink</option>
            <option value="Fresh Juice">Fresh Juice</option>
        </select>
        <textarea name="address" placeholder="Delivery Address"></textarea>
        <input type="date" name="date">
        <button type="submit">Place Order</button>
    </form>
    <div id="message"></div>

<script>
const params = new URLSearchParams(window.location.search);
const messageDiv = document.getElementById("message");

if (params.get("success")) {
    messageDiv.innerHTML = "<p style='color:green;text-align:center;'>Order placed successfully!</p>";
}

if (params.get("error")) {
    messageDiv.innerHTML = "<p style='color:red;'>Error placing order!</p>";
}
</script>
</div>
