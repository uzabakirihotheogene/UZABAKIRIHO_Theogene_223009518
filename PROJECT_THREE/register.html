<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Theogene Relax Hotel</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<nav>
  <div class="logo">
    <img src="logo.png" alt="Hotel Logo">
  </div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="menu.html">Menu</a>
    <a href="gallery.html">Gallery</a>
    <a href="order.html">Order</a>
    <a href="contact.html">Contact Us</a>
    <a href="login.html" style="background: #c9a84c; color: #1a3a2a;">Login</a>
  </div>
</nav>

<div class="container">
  <h2 style="text-align:center; margin-bottom:20px; color:#1a3a2a;">Create Account</h2>

  <!-- Error Messages -->
  <div id="error-msg" style="display:none; background:#fee2e2; color:#dc2626; padding:12px;
       border-radius:8px; text-align:center; margin-bottom:15px; max-width:600px; margin-left:auto; margin-right:auto;">
    ❌ Username already exists. Please choose another.
  </div>
  <div id="fail-msg" style="display:none; background:#fee2e2; color:#dc2626; padding:12px;
       border-radius:8px; text-align:center; margin-bottom:15px; max-width:600px; margin-left:auto; margin-right:auto;">
    ❌ Registration failed. Please try again.
  </div>

  <form action="register.php" method="POST">
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Register</button>
  </form>

  <p style="text-align:center; margin-top:15px;">
    Already have an account? <a href="login.html">Login here</a>
  </p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  if (params.get("error") === "exists") {
    document.getElementById("error-msg").style.display = "block";
  }
  if (params.get("error") === "fail") {
    document.getElementById("fail-msg").style.display = "block";
  }
</script>

<footer style="text-align:center; margin-top:50px; padding:20px; background:#1a3a2a; color:white;">
  <p>© 2026 THEOGENE RELAX HOTEL | All Rights Reserved</p>
</footer>
</body>
</html>
